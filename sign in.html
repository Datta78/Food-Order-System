<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In | MyOnlineMeal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, monospace;
            background: #f2f2f2;
        }

        #logo{
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: white;
            z-index: 10000;
            display: flex;
            align-items: center;
        }

        #logo img{
            height: 80px;
            margin-left: 25px;
            border-radius: 50%;
            border: 1px solid black;
        }

        #menu{
            position: fixed;
            top: 80px;          
            left: 0;
            width: 100%;        
            height: 80px;
            background-color: green;
            z-index: 9999;
            display: flex;
            align-items: center;
        }

        #menu ul{
            list-style: none;
            display: flex;
            flex: 1;
            justify-content: space-around;
        }

        #menu ul li{
            position: relative;
            width: 120px;
            height: 80px;
            line-height: 80px;
            text-align: center;
        }

        #menu ul li a{
            text-decoration: none;
            color: white;
            font-size: 22px;
            display: block;
        }

        #menu ul li a:hover{
            background-color: orange;
            font-style: italic;
        }

        #menu ul li ul{
            position: absolute;
            top: 80px;
            left: 0;
            display: none;
            background-color: green;
            width: 120px;
        }

        #menu ul li ul li{
            height: 45px;      
            line-height: 45px;    
        }

        #menu ul li ul li a{
            font-size: 20px;      
        }

        #menu ul li:hover ul{
            display: block;
        }

        .signin-container{
            margin-top: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .signin-box{
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .signin-box h2{
            text-align: center;
            margin-bottom: 20px;
            color: green;
        }

        .signin-box input{
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }

        .signin-box button{
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        .signin-box button:hover{
            background: orange;
        }

        .signin-box p{
            text-align: center;
            margin-top: 15px;
        }

        .signin-box a{
            text-decoration: none;
            color: green;
        }
    </style>
</head>

<body>

    <div id="logo">
        <img src="images/logo.png" alt="MyOnlineMeal">
    </div>
    <nav id="menu">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>

            <li>
                <a href="#">Food</a>
                <ul>
                    <li><a href="#">veg</a></li>
                    <li><a href="#">Non-veg</a></li>
                    
                </ul>
            </li>

            <li><a href="#">Menu</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">Login</a></li>
            <li><a href="#">Signin</a></li>
        </ul>
    </nav>
    <div class="signin-container">
        <div class="signin-box">
            <h2>Sign In</h2>
            <form>
                <input type="email" placeholder="Enter Email" required>
                <input type="password" placeholder="Enter Password" required>
                <button type="submit">Sign In</button>
            </form>
            <p>New User? <a href="#">Create Account</a></p>
        </div>
    </div>

</body>
</html>
